<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porygon Thermal Labels Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useCallback, useMemo } from 'react';
        import ReactDOM from 'react-dom';
        import { 
            Printer, FileText, Download, Trash2, Eye, Copy, 
            CheckCircle, AlertCircle, RefreshCw, ChevronLeft, 
            ChevronRight, Layers 
        } from 'lucide-react';

        const App = () => {
            const [zpl, setZpl] = useState(`^XA\n^MCY\n^CI28\n^LH5,15\n^FO120,20^A0N,24,24^FDPORYGON READY^FS\n^XZ`);
            const [previewUrl, setPreviewUrl] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [labelSize, setLabelSize] = useState({ width: 4, height: 6 });
            const [currentLabelIndex, setCurrentLabelIndex] = useState(0);
            const [copied, setCopied] = useState(false);

            const totalLabels = useMemo(() => {
                return (zpl.match(/\^XA/gi) || []).length;
            }, [zpl]);

            const updatePreview = useCallback(async () => {
                if (!zpl.trim() || totalLabels === 0) {
                    setError("No se detectaron etiquetas (^XA ... ^XZ)");
                    return;
                }
                setLoading(true);
                setError(null);
                try {
                    const url = `https://api.labelary.com/v1/printers/8dpmm/labels/${labelSize.width}x${labelSize.height}/${currentLabelIndex}/`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Accept': 'image/png', 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: zpl
                    });
                    if (response.ok) {
                        const blob = await response.blob();
                        if (previewUrl) URL.revokeObjectURL(previewUrl);
                        setPreviewUrl(URL.createObjectURL(blob));
                    } else {
                        setError("Error de formato en el código ZPL.");
                    }
                } catch (err) {
                    setError("Error de conexión con el motor de etiquetas.");
                } finally { setLoading(false); }
            }, [zpl, labelSize, currentLabelIndex]);

            const downloadPdf = async () => {
                setLoading(true);
                try {
                    const url = `https://api.labelary.com/v1/printers/8dpmm/labels/${labelSize.width}x${labelSize.height}/`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Accept': 'application/pdf', 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: zpl
                    });
                    if (response.ok) {
                        const blob = await response.blob();
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = `porygon_batch_${totalLabels}.pdf`;
                        link.click();
                    }
                } finally { setLoading(false); }
            };

            useEffect(() => {
                const t = setTimeout(updatePreview, 800);
                return () => clearTimeout(t);
            }, [zpl, labelSize, currentLabelIndex]);

            return React.createElement('div', { className: 'min-h-screen p-4 md:p-8 max-w-7xl mx-auto' }, [
                // Header
                React.createElement('header', { className: 'mb-8 flex flex-col md:flex-row justify-between items-center gap-4' }, [
                    React.createElement('div', { className: 'flex items-center gap-4' }, [
                        React.createElement('div', { className: 'bg-blue-600 p-3 rounded-2xl shadow-lg' }, 
                            React.createElement(Printer, { className: 'text-white', size: 28 })),
                        React.createElement('div', null, [
                            React.createElement('h1', { className: 'text-2xl font-black text-slate-800 tracking-tighter' }, 'PORYGON THERMAL LABELS'),
                            React.createElement('p', { className: 'text-[10px] font-bold text-slate-400 uppercase tracking-widest' }, 'Online Sales Logistics Engine')
                        ])
                    ]),
                    React.createElement('div', { className: 'bg-white p-2 rounded-2xl shadow-sm border flex gap-1' }, 
                        [6, 8, 10].map(h => React.createElement('button', {
                            key: h,
                            onClick: () => setLabelSize({width: 4, height: h}),
                            className: `px-5 py-2 text-xs font-black rounded-xl transition-all ${labelSize.height === h ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`
                        }, `4x${h}"`))
                    )
                ]),

                // Main Content
                React.createElement('div', { className: 'grid grid-cols-1 lg:grid-cols-12 gap-8' }, [
                    // Editor
                    React.createElement('div', { className: 'lg:col-span-5' }, 
                        React.createElement('div', { className: 'bg-white rounded-3xl shadow-xl border overflow-hidden flex flex-col h-[700px]' }, [
                            React.createElement('div', { className: 'px-6 py-4 border-b bg-slate-50 flex justify-between' }, [
                                React.createElement('span', { className: 'text-xs font-black text-slate-500' }, 'ZPL INPUT'),
                                React.createElement('button', { onClick: () => setZpl(''), className: 'text-slate-400 hover:text-red-500' }, React.createElement(Trash2, { size: 18 }))
                            ]),
                            React.createElement('textarea', {
                                value: zpl,
                                onChange: (e) => { setZpl(e.target.value); setCurrentLabelIndex(0); },
                                className: 'flex-1 p-6 font-mono text-[11px] bg-slate-900 text-blue-300 focus:outline-none resize-none'
                            }),
                            React.createElement('div', { className: 'p-4 bg-slate-50 border-t flex justify-between text-[10px] font-bold text-slate-400' }, [
                                React.createElement('span', null, `${totalLabels} ETIQUETAS`),
                                React.createElement('span', null, `${zpl.length} BYTES`)
                            ])
                        ])
                    ),

                    // Preview
                    React.createElement('div', { className: 'lg:col-span-7' }, 
                        React.createElement('div', { className: 'bg-white rounded-3xl shadow-xl border overflow-hidden flex flex-col h-[700px]' }, [
                            React.createElement('div', { className: 'px-6 py-4 border-b bg-slate-50 flex justify-between items-center' }, [
                                React.createElement('div', { className: 'flex items-center gap-3' }, [
                                    totalLabels > 1 && React.createElement('div', { className: 'flex bg-slate-200 rounded-full p-1 items-center' }, [
                                        React.createElement('button', { disabled: currentLabelIndex === 0, onClick: () => setCurrentLabelIndex(c => c - 1), className: 'p-1 disabled:opacity-20' }, React.createElement(ChevronLeft, { size: 16 })),
                                        React.createElement('span', { className: 'text-[10px] font-black w-12 text-center' }, `${currentLabelIndex + 1}/${totalLabels}`),
                                        React.createElement('button', { disabled: currentLabelIndex >= totalLabels - 1, onClick: () => setCurrentLabelIndex(c => c + 1), className: 'p-1 disabled:opacity-20' }, React.createElement(ChevronRight, { size: 16 }))
                                    ])
                                ]),
                                React.createElement('button', { 
                                    onClick: downloadPdf, 
                                    disabled: loading || totalLabels === 0,
                                    className: 'bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2 transition-all shadow-lg active:scale-95 disabled:bg-slate-200'
                                }, [React.createElement(Download, { size: 16 }), 'DESCARGAR PDF'])
                            ]),
                            React.createElement('div', { className: 'flex-1 overflow-auto p-10 bg-slate-100/50 flex justify-center items-start relative' }, [
                                loading && React.createElement('div', { className: 'absolute inset-0 bg-white/50 backdrop-blur-sm z-10 flex items-center justify-center font-black text-blue-600' }, 'CARGANDO...'),
                                error && React.createElement('div', { className: 'absolute top-4 inset-x-4 bg-red-600 text-white p-3 rounded-xl text-xs font-bold flex gap-2' }, [React.createElement(AlertCircle, { size: 16 }), error]),
                                previewUrl ? React.createElement('img', { src: previewUrl, className: 'shadow-2xl border bg-white max-w-full', style: { width: '400px' } }) : 
                                React.createElement('div', { className: 'mt-32 opacity-10' }, React.createElement(Printer, { size: 80 }))
                            ]),
                            React.createElement('div', { className: 'p-3 bg-slate-900 text-[9px] font-black text-blue-400 text-center tracking-[0.3em]' }, 'POWERED BY PORYGON ENGINE • 203 DPI')
                        ])
                    )
                ])
            ]);
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
